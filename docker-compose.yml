version: "3.9"

services:
  # ── PostgreSQL Database ─────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: eexam-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: eexam_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - eexam-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eexam_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot App ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eexam-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/eexam_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_JWT_SECRET: LocalDevSecretKeyChangeThisInProduction1234567890AbCdEf
      APP_JWT_EXPIRATION_MS: 86400000
      APP_ADMIN_DEFAULT_USERNAME: admin
      APP_ADMIN_DEFAULT_PASSWORD: Admin@123
      SERVER_PORT: 8080

volumes:
  eexam-postgres-data:
