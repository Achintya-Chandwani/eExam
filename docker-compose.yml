version: "3.9"

services:
  # ── MySQL Database ──────────────────────────────────
  db:
    image: mysql:8.0
    container_name: eexam-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: eexam_db
    ports:
      - "3307:3306"          # 3307 on host so it won't clash with a local MySQL
    volumes:
      - eexam-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot App ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eexam-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/eexam_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_JWT_SECRET: LocalDevSecretKeyChangeThisInProduction1234567890AbCdEf
      APP_JWT_EXPIRATION_MS: 86400000
      APP_ADMIN_DEFAULT_USERNAME: admin
      APP_ADMIN_DEFAULT_PASSWORD: Admin@123
      SERVER_PORT: 8080

volumes:
  eexam-mysql-data:
