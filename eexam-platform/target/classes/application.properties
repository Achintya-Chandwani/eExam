# ===== Server =====
server.port=${SERVER_PORT:8080}

# ===== MySQL =====
# Reads from environment variables; falls back to local dev values
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/eexam_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:@Achu2505@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
app.jwt.secret=${APP_JWT_SECRET:eExamPlatformSuperSecretKeyChangeThisInProduction123456789}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# ===== Default admin account (created on first startup if it doesn't exist) =====
app.admin.default-username=${APP_ADMIN_DEFAULT_USERNAME:admin}
app.admin.default-password=${APP_ADMIN_DEFAULT_PASSWORD:Admin@123}
