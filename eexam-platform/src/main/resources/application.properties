# ===== Server =====
server.port=${SERVER_PORT:8080}

# ===== PostgreSQL =====
# Reads from environment variables; falls back to local dev values
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eexam_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ===== JWT =====
app.jwt.secret=${APP_JWT_SECRET:eExamPlatformSuperSecretKeyChangeThisInProduction123456789}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# ===== Default admin account (created on first startup if it doesn't exist) =====
app.admin.default-username=${APP_ADMIN_DEFAULT_USERNAME:admin}
app.admin.default-password=${APP_ADMIN_DEFAULT_PASSWORD:Admin@123}

